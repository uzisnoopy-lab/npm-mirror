[project]
site_name = "NPM Mirror — Self-Hosted Verdaccio Registry & Offline NPM Cache"
site_description = "NPM Mirror is a self-hosted npm registry built on Verdaccio that mirrors and caches npm/pnpm/yarn packages. Keep installing dependencies fast, offline-capable, and available even during internet outages — by Cipher Unit."
site_author = "Mohammad Taha Batoomi"
site_url = "https://cipherunits.github.io/npm-mirror/"
copyright = "Copyright &copy; 2026 Cipher Unit"

repo_url = "https://github.com/cipherunits/npm-mirror"
repo_name = "cipherunits/npm-mirror"
edit_uri = "edit/main/docs/"

docs_dir = "docs"
site_dir = "site"
language = "en"

nav = [
  { "Getting Started" = "index.md" },
  { "How It Works" = "how-it-works.md" },
  { "Installation & Setup" = "getting-started.md" },
  { "Team Setup" = "team-setup.md" },
  { "Configuration" = "configuration.md" },
  { "Preloading" = "preload.md" },
  { "Backup and Restore" = "backup.md" },
  { "Project Structure" = "structure.md" },
  { "Offline Mode" = "offline.md" }
]

features = [
  "navigation.tracking",
  "navigation.path",
  "navigation.prune",
  "navigation.indexes",
  "navigation.instant",
  "navigation.top",
  "content.code.copy",
  "content.footnote.tooltips",
  "content.tooltips",
  "search.highlight",
  "search.share",
  "search.suggest"
]

[project.theme]
custom_dir = "overrides"
logo = "images/logo.png"
favicon = "images/favicon.png"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/cipherunits/npm-mirror"
name = "npm-mirror on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/cipherunits"
name = "Cipher Unit on GitHub"

[[project.extra.social]]
